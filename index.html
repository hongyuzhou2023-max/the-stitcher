  /* ============================================================
     \u8BBE\u8BA1\u8BED\u8A00\uFF08\u53C2\u8003 geometric-topology-diagram\uFF09\uFF1A
     Z \u8F74\u666F\u6DF1\uFF08\u65E0\u8FB9\u6846\u73BB\u7483\u5361\u7247 + \u67D4\u548C\u5F25\u6563\u9634\u5F71\uFF09
     + \u514B\u5236\u914D\u8272\uFF0862% \u4E3B\u80CC\u666F / 30% \u6B21\u7EA7\u9762\u677F / 8% \u5F3A\u8C03\u8272\uFF09
     + \u6D41\u53D8\u5B66\u963B\u5C3C\u52A8\u753B + \u6590\u6CE2\u90A3\u5951\u95F4\u8DDD + \u9EC4\u91D1\u6BD4\u4F8B\u884C\u9AD8\u3002
     \u4E3B\u9898\uFF1ANoir \u6697\u623F\u5E95 + \u96FE\u84DD\u5F3A\u8C03\uFF08\u5EF6\u7EED\u672C app \u5DF2\u5B9A\u7684\u65E0\u91D1\u914D\u8272\uFF09\u3002
     ============================================================ */

  /* \u95F4\u8DDD\uFF1A\u6590\u6CE2\u90A3\u5951 8/13/21/34 */
  --space-xs: 8px;
  --space-sm: 13px;
  --space-md: 21px;
  --space-lg: 34px;

  /* \u5706\u89D2\uFF1A\u5361\u7247 13\uFF0C\u5927\u5BB9\u5668 22 */
  --radius: 10px;
  --radius-md: 13px;
  --radius-lg: 22px;

  /* \u6D41\u53D8\u5B66\u963B\u5C3C\u66F2\u7EBF\uFF1A\u84C4\u529B \u2192 \u8D2F\u901A \u2192 \u963B\u5C3C\u56DE\u5F39 */
  --ease-rheo: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-rheo-strong: cubic-bezier(0.65, -0.55, 0.27, 1.55);
  --dur-fast: 160ms;
  --dur: 340ms;
  --dur-strong: 560ms;

  /* Noir \u6697\u623F\uFF08\u9ED8\u8BA4\u6DF1\u8272\u4E3B\u9898\uFF09 */
  --bg-app: #0b0d14;
  --bg-panel: rgba(24, 28, 42, 0.62);
  --bg-panel-strong: rgba(22, 26, 38, 0.92);
  --bg-panel-solid: #161a26;
  --bg-elevated: rgba(255, 255, 255, 0.06);
  --bg-hover: rgba(255, 255, 255, 0.11);
  --border: rgba(255, 255, 255, 0.08);
  --divider: rgba(255, 255, 255, 0.07);
  --text: #e7eaf3;
  --text-muted: #aeb6c9;
  --text-faint: #6d7690;

  --accent: #6e9bb0;
  --accent-hover: #86b0c3;
  --accent-soft: rgba(110, 155, 176, 0.14);
  --accent-soft-strong: rgba(110, 155, 176, 0.28);
  --accent-contrast: #0b0d14;
  --focus-ring: rgba(110, 155, 176, 0.22);

  --chip-active-bg: #e7eaf3;
  --chip-active-text: #12151f;

  --danger: #f0828b;

  --stage-bg0: #151c26;
  --stage-bg1: #0e131a;
  --stage-bg: #0d1017;
  --stage-inset: rgba(255, 255, 255, 0.03);

  --about-backdrop: rgba(6, 8, 14, 0.55);
  --swap-btn-bg: rgba(16, 20, 30, 0.82);
  --swap-btn-fg: #e7eaf3;
  --spinner-track: rgba(255, 255, 255, 0.12);

  --touch-min: 44px;
  --font: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont,
    "PingFang SC", "Helvetica Neue", "Hiragino Sans GB", "Segoe UI",
    "Microsoft YaHei", sans-serif;

  --card-shadow: 0 10px 34px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.3);
  --card-shadow-hover: 0 18px 46px rgba(0, 0, 0, 0.55),
    0 4px 10px rgba(0, 0, 0, 0.35);
  --shadow: var(--card-shadow);
}

/* Mist \u4EAE\u8272\u4E3B\u9898\uFF1A\u96FE\u84DD\u5E95 + \u67D4\u767D\u9762\u677F */
[data-theme='light'] {
  --bg-app: #edf3f5;
  --bg-panel: rgba(255, 255, 255, 0.72);
  --bg-panel-strong: rgba(255, 255, 255, 0.94);
  --bg-panel-solid: #ffffff;
  --bg-elevated: rgba(41, 58, 66, 0.06);
  --bg-hover: rgba(41, 58, 66, 0.1);
  --border: rgba(58, 96, 112, 0.12);
  --divider: rgba(58, 96, 112, 0.1);
  --text: #1f2f38;
  --text-muted: #597481;
  --text-faint: #93abb6;

  --accent: #5b93a8;
  --accent-hover: #487c90;
  --accent-soft: rgba(91, 147, 168, 0.14);
  --accent-soft-strong: rgba(91, 147, 168, 0.26);
  --accent-contrast: #ffffff;
  --focus-ring: rgba(91, 147, 168, 0.22);

  --chip-active-bg: #293a42;
  --chip-active-text: #ffffff;

  --danger: #c15c63;

  --stage-bg0: #e8eef1;
  --stage-bg1: #dfe8ec;
  --stage-bg: #e2ecef;
  --stage-inset: rgba(255, 255, 255, 0.65);

  --about-backdrop: rgba(31, 47, 56, 0.28);
  --swap-btn-bg: rgba(255, 255, 255, 0.92);
  --swap-btn-fg: #1f2f38;
  --spinner-track: rgba(41, 58, 66, 0.15);

  --card-shadow: 0 10px 34px rgba(58, 96, 112, 0.1),
    0 2px 7px rgba(58, 96, 112, 0.05);
  --card-shadow-hover: 0 18px 46px rgba(58, 96, 112, 0.14),
    0 4px 10px rgba(58, 96, 112, 0.06);
  --shadow: var(--card-shadow);
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  margin: 0;
  height: 100%;
  background: var(--bg-app);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  font-feature-settings: "tnum" 1;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--dur) var(--ease-rheo), color var(--dur) var(--ease-rheo);
}

html {
  /* \u624B\u673A\u7AEF\u7981\u6B62\u53CC\u51FB/\u634F\u5408\u7F29\u653E\u6574\u4E2A\u9875\u9762\uFF08\u753B\u5E03\u5185\u7684\u634F\u5408\u7F29\u653E\u7167\u7247\u4E0D\u53D7\u5F71\u54CD\uFF09\uFF0C
     \u9632\u6B62\u8BEF\u7F29\u653E\u540E\u9875\u9762\u8D85\u51FA\u5C4F\u5E55\u9700\u8981\u6EDA\u52A8 */
  touch-action: pan-x pan-y;
  overscroll-behavior: none;
}

body {
  overflow: hidden;
  overscroll-behavior: none;
}

@media (min-width: 1024px) {
  :root {
    --touch-min: 36px;
  }

  html,
  body,
  #root {
    /* \u684C\u9762\u7AEF\u5B57\u4F53\u6574\u4F53\u7B49\u6BD4\u653E\u5927\uFF08\u79FB\u52A8\u7AEF\u7EF4\u6301\u4E0D\u53D8\uFF0C\u89C1\u57FA\u51C6 13px\uFF09 */
    font-size: 15px;
  }
}

button,
input,
select {
  font: inherit;
  color: inherit;
}

button {
  cursor: pointer;
  border: none;
  background: none;
}

img {
  max-width: 100%;
  display: block;
}

  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  /* minmax(0,1fr) \u9632\u6B62\u5934\u90E8\u5185\u5BB9\u8FC7\u5BBD\u65F6\u628A\u6574\u5217\u8F68\u9053\u6491\u7834\u89C6\u53E3\uFF08\u624B\u673A\u7AEF\u6A2A\u5411\u6EA2\u51FA\u7684\u6839\u56E0\uFF09 */
  grid-template-columns: minmax(0, 1fr);
  /* --app-height \u7531 JS \u6309 visualViewport \u5B9E\u65F6\u5199\u5165\uFF08\u771F\u673A\u5730\u5740\u680F\u6536\u8D77/\u5C55\u5F00\u65F6\u5237\u65B0\uFF09\uFF0C
     \u4FDD\u8BC1 app \u6C38\u8FDC\u7CBE\u786E\u8D34\u5408\u624B\u673A\u6D4F\u89C8\u5668\u771F\u5B9E\u53EF\u89C1\u533A\u57DF\uFF0C\u4EFB\u4F55\u6A21\u5F0F\u90FD\u65E0\u9700\u6EDA\u52A8 */
  height: var(--app-height, 100%);
  max-height: var(--app-height, 100dvh);
  overflow: hidden;
}

/* \u5934\u90E8\uFF1A\u76F4\u63A5\u6D6E\u5728\u5E94\u7528\u5E95\u8272\u4E0A\uFF08\u65E0\u8FB9\u6846\u3001\u65E0\u9762\u677F\u5E95\uFF09\uFF0C\u54C1\u724C\u533A\u653E\u5927\u7559\u767D */
.app-header {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: 9px var(--space-md);
  flex-shrink: 0;
}

.brand-block {
  display: flex;
  align-items: baseline;
  gap: 11px;
  flex-shrink: 0;
  margin-right: var(--space-sm);
}

.app-header h1 {
  margin: 0;
  font-size: 23px;
  font-weight: 800;
  letter-spacing: 0.02em;
  white-space: nowrap;
  line-height: 1.2;
}

.brand-sub {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* \u4E09\u680F\uFF1A\u5361\u7247\u5F0F\u6F02\u6D6E\u5E03\u5C40\uFF0C\u680F\u95F4\u7559\u7F1D\u9732\u51FA\u5E95\u8272\uFF0C\u5F62\u6210 Z \u8F74\u666F\u6DF1 */
.app-body {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr) 288px;
  gap: var(--space-sm);
  padding: 0 var(--space-sm) var(--space-sm);
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

.panel {
  background: var(--bg-panel);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  border: none;
  border-radius: var(--radius-md);
  box-shadow: var(--card-shadow);
  min-height: 0;
  overflow: auto;
  display: flex;
  flex-direction: column;
  transition: box-shadow var(--dur) var(--ease-rheo);
}

.panel:hover {
  box-shadow: var(--card-shadow-hover);
}

.panel > .library,
.panel > .mode-panel {
  flex: 1;
}

.panel-right {
  border: none;
}

/* \u684C\u9762\u7AEF\u53F3\u4FA7\u9762\u677F\u7981\u6B62\u6EDA\u52A8\uFF0C\u5168\u90E8\u5185\u5BB9\u4E00\u5C4F\u663E\u793A */
@media (min-width: 1024px) {
  .panel-right {
    overflow: hidden;
  }
}

.stage-wrap {
  min-height: 0;
  min-width: 0;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(ellipse at 30% 20%, var(--stage-bg0) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, var(--stage-bg1) 0%, transparent 50%),
    var(--stage-bg);
  box-shadow: inset 0 1px 0 var(--stage-inset);
  transition: background var(--dur) var(--ease-rheo);
}

.mobile-tabbar {
  display: none;
}

.desktop-only {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.mobile-sheet {
  display: none;
}

@media (max-width: 1023px) {
  /* \u624B\u673A\u7AEF\u5934\u90E8\u6362\u6210\u4E24\u884C\uFF1A\u7B2C\u4E00\u884C \u54C1\u724C + \u64CD\u4F5C\u6309\u94AE\uFF0C\u7B2C\u4E8C\u884C \u9875\u6807\u7B7E\u6A2A\u5411\u6EDA\u52A8\u3002
     \u907F\u514D\u5355\u884C\u5185\u5BB9\u8D85\u51FA\u5C4F\u5BBD\u628A\u8BED\u8A00\u6309\u94AE\u6324\u51FA\u5C4F\u5E55\u3002 */
  .app-header {
    flex-wrap: wrap;
    padding: 8px var(--space-sm) 4px;
    gap: 8px;
  }

  .app-header h1 {
    font-size: 18px;
  }

  .brand-block {
    order: 1;
    margin-right: auto;
  }

  .header-actions {
    order: 2;
  }

  .app-header .page-tabs {
    order: 3;
    flex: 1 1 100%;
    min-width: 100%;
  }

  .app-body {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1fr) auto;
    /* \u517C\u5BB9 iPhone \u5E95\u90E8 Home \u6761 / Android \u624B\u52BF\u6761\u7684\u5B89\u5168\u533A */
    padding: 0 8px calc(8px + env(safe-area-inset-bottom, 0px));
    gap: 8px;
  }

  .desktop-only {
    display: none !important;
  }

  .mobile-tabbar {
    display: flex;
    gap: 8px;
    padding: 8px;
    flex-shrink: 0;
    background: var(--bg-panel);
    backdrop-filter: blur(14px) saturate(160%);
    border-radius: var(--radius-md);
    box-shadow: var(--card-shadow);
  }

  .mobile-tabbar button {
    flex: 1;
    min-height: var(--touch-min);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    transition: background var(--dur-fast) var(--ease-rheo);
  }

  .mobile-tabbar button.active {
    background: var(--accent-soft-strong);
    color: var(--accent-hover);
  }

  .mobile-sheet {
    display: block;

/* \u7B2C 5 \u6B65\uFF1A\u591A\u9875 + \u5BFC\u51FA */
.tut-export {
  flex-direction: column;
  gap: 6px;
}

.tut-tabs {
  display: flex;
  gap: 5px;
}

.tut-tabs .tab {
  width: 30px;
  height: 8px;
  border-radius: 3px;
  background: #2a3340;
}

.tut-tabs .tab.active {
  background: var(--accent);
}

.tut-export-canvas {
  width: 64px;
  height: 82px;
  border-radius: 4px;
  background: #f0f0ee;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  justify-content: center;
  padding: 6px;
}

.tut-export-canvas i {
  display: block;
  width: 80%;
  height: 40%;
  border-radius: 1px;
}

.tut-export-canvas .p1 { background: linear-gradient(135deg, #7fa8c0, #40607a); }
.tut-export-canvas .p2 { background: linear-gradient(135deg, #c8ab84, #8a6f4a); }

.tut-arrow-down {
  font-size: 16px;
  color: var(--accent);
  font-weight: 700;
  line-height: 1;
  animation: tut-arrow 1.6s ease-in-out infinite;
}

@keyframes tut-arrow {
  0%, 100% {
    transform: translateY(-3px);
    opacity: 0.4;
  }
  50% {
    transform: translateY(3px);
    opacity: 1;
  }
}

.tut-file-card {
  padding: 2px 10px;
  border-radius: 5px;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
}

.library {
  padding: 12px;
  gap: 12px;
  flex: 1;
  min-height: 100%;
}

.library.library-dragover {
  outline: 2px dashed var(--accent);
  outline-offset: -6px;
  background: rgba(110, 155, 176, 0.08);
}

.dropzone {
  border: 1.5px dashed rgba(255, 255, 255, 0.14);
  border-radius: var(--radius-md);
  padding: var(--space-sm);
  text-align: center;
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.55;
  pointer-events: none;
  transition: border-color var(--dur-fast) ease;
}

.dropzone .btn {
  pointer-events: auto;
}

.dropzone.dragover {
  border-color: var(--accent);
  color: var(--accent);
}

.dropzone .hint-desktop {
  display: block;
}

.dropzone .hint-mobile {
  display: none;
}

@media (max-width: 1023px) {
  .dropzone .hint-desktop {
    display: none;
  }
  .dropzone .hint-mobile {
    display: block;
  }
}

.thumb-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.thumb-item {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius);
  overflow: hidden;
  border: none;
  background: var(--bg-elevated);
  cursor: grab;
  min-height: var(--touch-min);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  transition: transform var(--dur-fast) var(--ease-rheo),
    box-shadow var(--dur-fast) var(--ease-rheo);
}

.thumb-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
}

.thumb-item.selected {
  box-shadow: 0 0 0 2px var(--bg-panel-solid), 0 0 0 4px var(--accent);
}

.thumb-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-item .del {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.65);
  color: #fff;
  font-size: 14px;
  line-height: 1;
}

.canvas-stage {
  flex: 1 1 auto;
  min-height: 0;
  min-width: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

.canvas-frame {
  position: relative;
  flex: 0 0 auto;
  max-width: 100%;
  max-height: 100%;
  touch-action: none;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55), 0 6px 18px rgba(0, 0, 0, 0.4);
}

.canvas-frame canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.slot-overlay {
  position: absolute;
  border: 2px solid transparent;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.slot-overlay.active {
  border-color: var(--accent);
}

.slot-overlay.empty {
  border-color: rgba(110, 155, 176, 0.4);
  border-style: dashed;
  background: rgba(0, 0, 0, 0.03);
}

.slot-overlay .slot-hint {
  font-size: 12px;
  color: var(--text-muted);
  pointer-events: none;
  user-select: none;
}

/* \u76F8\u90BB\u7167\u7247\u4E4B\u95F4\u7684\u4E00\u952E\u4E92\u6362\u6309\u94AE */
.slot-swap-btn {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 32px;
  height: 32px;
  min-height: 32px;
  padding: 0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--swap-btn-bg);
  color: var(--swap-btn-fg);
  box-shadow: var(--card-shadow), inset 0 0 0 1px var(--border);
  z-index: 5;
  touch-action: manipulation;
  transition: background var(--dur-fast) var(--ease-rheo),
    color var(--dur-fast) var(--ease-rheo),
    transform var(--dur-fast) var(--ease-rheo);
}

.slot-swap-btn svg {
  width: 16px;
  height: 16px;
}

.slot-swap-btn:hover {
  background: var(--accent);
  color: var(--accent-contrast);
  transform: translate(-50%, -50%) scale(1.12);
}

.slot-swap-btn:active {
  transform: translate(-50%, -50%) scale(0.92);
}

@media (max-width: 1023px) {
  .slot-swap-btn {
    width: 36px;
    height: 36px;
    min-height: 36px;
  }
}

.mode-panel {
  padding: 11px 13px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  min-height: 0;
}

.mode-panel p.muted {
  margin: 0;
}

.section-title {
  margin: 3px 0 0;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--text-faint);
}

/* \u683C\u5F0F/\u5C3A\u5BF8\u884C\uFF1A\u56FA\u5B9A\u4E09\u7B49\u5206\uFF0C\u6C38\u4E0D\u6362\u884C\u6491\u9AD8\u9762\u677F */
.format-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}

.format-row button {
  padding: 0 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* \u5BFC\u51FA\u5C3A\u5BF8\u4F30\u7B97\u63D0\u793A\uFF1A\u7D27\u51D1\u5355\u884C\uFF0C\u4E0D\u6324\u5360\u9762\u677F\u9AD8\u5EA6 */
.export-estimate {
  margin: -4px 0 -3px;
  font-size: 10px;
  line-height: 1.45;
  color: var(--text-faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

/* \u9762\u677F\u5185\u5BB9\u884C\u4E0D\u8BB8\u88AB flex \u9759\u9ED8\u538B\u6241\uFF08\u538B\u6241 = \u6587\u5B57\u88AB\u88C1\u6389\u770B\u4E0D\u89C1\uFF09 */
.mode-panel > * {
  flex-shrink: 0;
}

.mode-switch {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

.mode-switch-5 {
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}

.mode-switch-5 button {
  padding: 5px 1px 4px;
  font-size: 9px;
}

.mode-switch-5 button .mode-icon {
  width: 16px;
  height: 20px;
}

.bg-color-row {
  margin-top: 2px;
}

.bg-color-seg {
  flex: 1;
  justify-content: flex-end;
}

.bg-color-picker-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 26px;
  min-width: 36px;
  border-radius: 999px;
  background: var(--bg-elevated);
  cursor: pointer;
  overflow: hidden;
}

.bg-color-picker-wrap input[type='color'] {
  width: 28px;
  height: 22px;
  padding: 0;
  border: none;
  background: transparent;
  cursor: pointer;
}

.mode-switch button {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 2px 5px;
  border-radius: var(--radius);
  border: none;
  background: var(--bg-elevated);
  font-size: 10px;
  line-height: 1.2;
  font-weight: 600;
  color: var(--text-muted);
  transition: background var(--dur-fast) var(--ease-rheo),
    color var(--dur-fast) var(--ease-rheo),
    transform var(--dur-fast) var(--ease-rheo),
    box-shadow var(--dur-fast) var(--ease-rheo);
}

.mode-switch button:hover {
  background: var(--bg-hover);
  transform: translateY(-1px);
}

.mode-switch button:active {
  transform: scale(0.95);
}

.mode-switch button .mode-icon {
  width: 19px;
  height: 24px;
  opacity: 0.7;
  transition: opacity var(--dur-fast) ease;
}

.mode-switch button.active {
  color: var(--accent-hover);
  background: var(--accent-soft);
  box-shadow: inset 0 0 0 1.5px var(--accent);
}

.mode-switch button.active .mode-icon {
  opacity: 1;
}

.mode-controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.panel-footer {
  margin-top: auto;
  padding-top: 4px;
}

@media (min-width: 1024px) {
  .mode-panel .toggle {
    min-height: 26px;
  }
}

.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 0;
}

.field-inline {
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.field-inline label {
  flex-shrink: 0;
}

.field label {
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  color: var(--text-faint);
}

.field-hint {
  margin-left: 4px;
  font-weight: 500;
  color: var(--accent-hover);
  letter-spacing: 0;
}

.field input[type='range'] {
  width: 100%;
  min-height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}

.field select,
.field input[type='number'],
.field input[type='text'] {
  min-height: var(--touch-min);
  padding: 0 11px;
  border-radius: var(--radius);
  border: none;
  background: var(--bg-elevated);
  box-shadow: inset 0 0 0 1px var(--border);
  font-weight: 600;
  transition: box-shadow var(--dur-fast) var(--ease-rheo);
}

.field select:focus,
.field input:focus {
  outline: none;
  box-shadow: inset 0 0 0 1.5px var(--accent), 0 0 0 4px var(--focus-ring);
}

.toggle input {
  accent-color: var(--accent);
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-height: var(--touch-min);
}

.toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: var(--touch-min);
}

.toggle input {
  width: 18px;
  height: 18px;
}

.export-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 88px;
  transform: translateX(-50%);
  z-index: 60;
  max-width: min(90vw, 420px);
  padding: 12px 18px;
  border-radius: 999px;
  background: var(--bg-panel-strong);
  backdrop-filter: blur(14px) saturate(160%);
  border: none;
  box-shadow: var(--card-shadow-hover);
  font-size: 13px;
  font-weight: 600;
  animation: toast-rise var(--dur) var(--ease-rheo);
}

@keyframes toast-rise {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%);
  }
}

.dialog-backdrop {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.dialog {
  width: min(100%, 440px);
  max-height: 85dvh;
  overflow: auto;
  background: var(--bg-panel-strong);
  backdrop-filter: blur(18px) saturate(160%);
  border: none;
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  box-shadow: var(--card-shadow-hover);
  animation: onboard-pop var(--dur-strong) var(--ease-rheo-strong);
}

.dialog h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

.dialog p {
  margin: 0 0 16px;
  color: var(--text-muted);
  line-height: 1.55;
  font-size: 14px;
}

.dialog-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

/* \u624B\u673A\u4FDD\u5B58\u63D0\u793A\uFF1A\u9192\u76EE\u7684\u5F3A\u8C03\u8272\u5361\u7247\uFF0C\u6307\u5BFC\u7528\u6237\u957F\u6309\u56FE\u7247\u4FDD\u5B58 */
.save-hint {
  padding: 10px 12px;
  border-radius: var(--radius);
  background: var(--accent-soft-strong);
  color: var(--accent-hover) !important;
  font-weight: 600;
  line-height: 1.6;
}

.ios-preview-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

/* \u5141\u8BB8\u957F\u6309\u5F39\u51FA\u7CFB\u7EDF\u300C\u5B58\u50A8\u56FE\u50CF\u300D\u83DC\u5355 */
.ios-preview-list img {
  -webkit-touch-callout: default;
  -webkit-user-select: auto;
  user-select: auto;
}

.ios-preview-list figure {
  margin: 0;
}

.ios-preview-list img {
  width: 100%;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.ios-preview-list figcaption {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

/* \u624B\u673A\u5BFC\u51FA\u4FDD\u5B58\uFF1A\u6574\u5361\u4E00\u5C4F\u5185\u5B8C\u6574\u663E\u793A\uFF08\u6210\u54C1 + \u6587\u4EF6\u540D + \u5B8C\u6210\u6309\u94AE\uFF09\uFF0C\u7981\u6B62\u6EDA\u52A8 */
@media (max-width: 1023px) {
  .dialog-backdrop {
    padding: 10px;
    align-items: stretch;
  }

  .dialog.dialog-ios-save {
    width: 100%;
    max-width: none;
    height: min(100%, var(--app-height, 100dvh));
    max-height: min(100%, var(--app-height, 100dvh));
    margin: auto 0;
    padding: 12px 12px 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .dialog.dialog-ios-save h2 {
    margin: 0;
    font-size: 16px;
    flex-shrink: 0;
  }

  .dialog.dialog-ios-save .save-hint {
    margin: 0;
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.45;
    flex-shrink: 0;
  }

  .dialog.dialog-ios-save .ios-preview-list {
    flex: 1 1 auto;
    min-height: 0;
    margin: 0;
    gap: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .dialog.dialog-ios-save .ios-preview-list figure {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .dialog.dialog-ios-save .ios-preview-list img {
    flex: 1 1 auto;
    min-height: 0;
    width: auto;
    max-width: 100%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
  }

  .dialog.dialog-ios-save .ios-preview-list figcaption {
    margin-top: 4px;
    flex-shrink: 0;
    font-size: 11px;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dialog.dialog-ios-save .dialog-actions {
    flex-shrink: 0;
    margin-top: 2px;
    justify-content: stretch;
  }

  .dialog.dialog-ios-save .dialog-actions .btn {
    flex: 1;
    min-height: 44px;
  }
}

.muted {
  color: var(--text-muted);
  font-size: 12px;
}

/* \u5206\u6BB5\u63A7\u4EF6\uFF1A\u65E0\u8FB9\u6846 chip\uFF0C\u9009\u4E2D\u4E3A\u53CD\u8272\u4EAE\u7247 */

  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.seg button {
  min-height: 40px;
  padding: 0 12px;
  border-radius: 999px;
  border: none;
  background: var(--bg-elevated);
  color: var(--text-muted);
  font-weight: 600;
  transition: background var(--dur-fast) var(--ease-rheo),
    color var(--dur-fast) var(--ease-rheo),
    transform var(--dur-fast) var(--ease-rheo);
}

.seg button:hover:not(:disabled) {
  background: var(--bg-hover);
  color: var(--text);
}

.seg button:active:not(:disabled) {
  transform: scale(0.94);
}

.seg button.active {
  background: var(--chip-active-bg);
  color: var(--chip-active-text);
}

.seg button:disabled {

.seg-compact {

}

.seg-compact button {

  padding: 0 10px;

   \u684C\u9762\u7AEF\u5B57\u53F7\u7B49\u6BD4\u653E\u5927\uFF08\u79FB\u52A8\u7AEF\u6CBF\u7528\u4E0A\u65B9\u57FA\u51C6\u503C\uFF0C\u5B8C\u5168\u4E0D\u53D7\u5F71\u54CD\uFF09\u3002
   \u6839\u5B57\u53F7\u5DF2\u5728 tokens.css \u4E2D\u7531 13px \u63D0\u5347\u5230 15px\uFF0C\u6B64\u5904\u8865\u9F50\u4ECD\u4F7F\u7528
   \u56FA\u5B9A\u50CF\u7D20\u503C\u3001\u4E0D\u968F\u6839\u5B57\u53F7\u8054\u52A8\u7684\u7EC4\u4EF6\uFF0C\u4FDD\u6301\u6574\u4F53\u534F\u8C03\u3001\u4E0D\u906E\u6321\u6EA2\u51FA\u3002

  .mode-switch button {

  .mode-switch-5 button {

  .mode-switch button .mode-icon {

  .field label {
