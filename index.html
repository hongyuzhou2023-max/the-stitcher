  /* ============================================================
     \u8BBE\u8BA1\u8BED\u8A00\uFF08\u53C2\u8003 geometric-topology-diagram\uFF09\uFF1A
     Z \u8F74\u666F\u6DF1\uFF08\u65E0\u8FB9\u6846\u73BB\u7483\u5361\u7247 + \u67D4\u548C\u5F25\u6563\u9634\u5F71\uFF09
     + \u514B\u5236\u914D\u8272\uFF0862% \u4E3B\u80CC\u666F / 30% \u6B21\u7EA7\u9762\u677F / 8% \u5F3A\u8C03\u8272\uFF09
     + \u6D41\u53D8\u5B66\u963B\u5C3C\u52A8\u753B + \u6590\u6CE2\u90A3\u5951\u95F4\u8DDD + \u9EC4\u91D1\u6BD4\u4F8B\u884C\u9AD8\u3002
     \u4E3B\u9898\uFF1ANoir \u6697\u623F\u5E95 + \u96FE\u84DD\u5F3A\u8C03\uFF08\u5EF6\u7EED\u672C app \u5DF2\u5B9A\u7684\u65E0\u91D1\u914D\u8272\uFF09\u3002
     ============================================================ */

  /* \u95F4\u8DDD\uFF1A\u6590\u6CE2\u90A3\u5951 8/13/21/34 */
  --space-xs: 8px;
  --space-sm: 13px;
  --space-md: 21px;
  --space-lg: 34px;

  /* \u5706\u89D2\uFF1A\u5361\u7247 13\uFF0C\u5927\u5BB9\u5668 22 */
  --radius: 10px;
  --radius-md: 13px;
  --radius-lg: 22px;

  /* \u6D41\u53D8\u5B66\u963B\u5C3C\u66F2\u7EBF\uFF1A\u84C4\u529B \u2192 \u8D2F\u901A \u2192 \u963B\u5C3C\u56DE\u5F39 */
  --ease-rheo: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-rheo-strong: cubic-bezier(0.65, -0.55, 0.27, 1.55);
  --dur-fast: 160ms;
  --dur: 340ms;
  --dur-strong: 560ms;

  /* Noir \u6697\u623F\u914D\u8272 */
  --bg-app: #0b0d14;
  --bg-panel: rgba(24, 28, 42, 0.62);
  --bg-panel-strong: rgba(22, 26, 38, 0.92);
  --bg-panel-solid: #161a26;
  --bg-elevated: rgba(255, 255, 255, 0.06);
  --bg-hover: rgba(255, 255, 255, 0.11);
  --border: rgba(255, 255, 255, 0.08);
  --divider: rgba(255, 255, 255, 0.07);
  --text: #e7eaf3;
  --text-muted: #aeb6c9;
  --text-faint: #6d7690;

  /* \u552F\u4E00\u5F3A\u8C03\u8272\uFF1A\u96FE\u84DD\uFF08\u4EC5\u7528\u4E8E\u9009\u4E2D/\u7126\u70B9/\u9AD8\u4EF7\u503C\u52A8\u4F5C\uFF09 */
  --accent: #6e9bb0;
  --accent-hover: #86b0c3;
  --accent-soft: rgba(110, 155, 176, 0.14);
  --accent-soft-strong: rgba(110, 155, 176, 0.28);
  --accent-contrast: #0b0d14;
  --focus-ring: rgba(110, 155, 176, 0.22);

  /* \u53CD\u8272\u6FC0\u6D3B\u7247\uFF08\u514B\u5236\u7528\u8272\uFF1A\u9009\u4E2D\u6001\u7528\u4EAE\u7247\u800C\u975E\u5F3A\u8C03\u8272\uFF09 */
  --chip-active-bg: #e7eaf3;
  --chip-active-text: #12151f;

  --danger: #f0828b;

  --touch-min: 44px;
  --font: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont,
    "PingFang SC", "Helvetica Neue", "Hiragino Sans GB", "Segoe UI",
    "Microsoft YaHei", sans-serif;

  /* \u5361\u7247\u666F\u6DF1\uFF1A\u65E0\u8FB9\u6846\uFF0C\u67D4\u548C\u5F25\u6563\u9634\u5F71 */
  --card-shadow: 0 10px 34px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.3);
  --card-shadow-hover: 0 18px 46px rgba(0, 0, 0, 0.55),
    0 4px 10px rgba(0, 0, 0, 0.35);
  --shadow: var(--card-shadow);
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  margin: 0;
  height: 100%;
  background: var(--bg-app);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  font-feature-settings: "tnum" 1;
  -webkit-tap-highlight-color: transparent;
}

html {
  /* \u624B\u673A\u7AEF\u7981\u6B62\u53CC\u51FB/\u634F\u5408\u7F29\u653E\u6574\u4E2A\u9875\u9762\uFF08\u753B\u5E03\u5185\u7684\u634F\u5408\u7F29\u653E\u7167\u7247\u4E0D\u53D7\u5F71\u54CD\uFF09\uFF0C
     \u9632\u6B62\u8BEF\u7F29\u653E\u540E\u9875\u9762\u8D85\u51FA\u5C4F\u5E55\u9700\u8981\u6EDA\u52A8 */
  touch-action: pan-x pan-y;
  overscroll-behavior: none;
}

body {
  overflow: hidden;
  overscroll-behavior: none;
}

@media (min-width: 1024px) {
  :root {
    --touch-min: 34px;
  }
}

button,
input,
select {
  font: inherit;
  color: inherit;
}

button {
  cursor: pointer;
  border: none;
  background: none;
}

img {
  max-width: 100%;
  display: block;
}
`,document.head.appendChild(t)})();(()=>{let t=document.createElement("style");t.textContent=`.app-shell {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  /* minmax(0,1fr) \u9632\u6B62\u5934\u90E8\u5185\u5BB9\u8FC7\u5BBD\u65F6\u628A\u6574\u5217\u8F68\u9053\u6491\u7834\u89C6\u53E3\uFF08\u624B\u673A\u7AEF\u6A2A\u5411\u6EA2\u51FA\u7684\u6839\u56E0\uFF09 */
  grid-template-columns: minmax(0, 1fr);
  /* --app-height \u7531 JS \u6309 visualViewport \u5B9E\u65F6\u5199\u5165\uFF08\u771F\u673A\u5730\u5740\u680F\u6536\u8D77/\u5C55\u5F00\u65F6\u5237\u65B0\uFF09\uFF0C
     \u4FDD\u8BC1 app \u6C38\u8FDC\u7CBE\u786E\u8D34\u5408\u624B\u673A\u6D4F\u89C8\u5668\u771F\u5B9E\u53EF\u89C1\u533A\u57DF\uFF0C\u4EFB\u4F55\u6A21\u5F0F\u90FD\u65E0\u9700\u6EDA\u52A8 */
  height: var(--app-height, 100%);
  max-height: var(--app-height, 100dvh);
  overflow: hidden;
}

/* \u5934\u90E8\uFF1A\u76F4\u63A5\u6D6E\u5728\u5E94\u7528\u5E95\u8272\u4E0A\uFF08\u65E0\u8FB9\u6846\u3001\u65E0\u9762\u677F\u5E95\uFF09\uFF0C\u54C1\u724C\u533A\u653E\u5927\u7559\u767D */
.app-header {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: 9px var(--space-md);
  flex-shrink: 0;
}

.brand-block {
  display: flex;
  align-items: baseline;
  gap: 11px;
  flex-shrink: 0;
  margin-right: var(--space-sm);
}

.app-header h1 {
  margin: 0;
  font-size: 23px;
  font-weight: 800;
  letter-spacing: 0.02em;
  white-space: nowrap;
  line-height: 1.2;
}

.brand-sub {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* \u4E09\u680F\uFF1A\u5361\u7247\u5F0F\u6F02\u6D6E\u5E03\u5C40\uFF0C\u680F\u95F4\u7559\u7F1D\u9732\u51FA\u5E95\u8272\uFF0C\u5F62\u6210 Z \u8F74\u666F\u6DF1 */
.app-body {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr) 288px;
  gap: var(--space-sm);
  padding: 0 var(--space-sm) var(--space-sm);
  min-height: 0;
  height: 100%;
  overflow: hidden;
}

.panel {
  background: var(--bg-panel);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  border: none;
  border-radius: var(--radius-md);
  box-shadow: var(--card-shadow);
  min-height: 0;
  overflow: auto;
  display: flex;
  flex-direction: column;
  transition: box-shadow var(--dur) var(--ease-rheo);
}

.panel:hover {
  box-shadow: var(--card-shadow-hover);
}

.panel > .library,
.panel > .mode-panel {
  flex: 1;
}

.panel-right {
  border: none;
}

/* \u684C\u9762\u7AEF\u53F3\u4FA7\u9762\u677F\u7981\u6B62\u6EDA\u52A8\uFF0C\u5168\u90E8\u5185\u5BB9\u4E00\u5C4F\u663E\u793A */
@media (min-width: 1024px) {
  .panel-right {
    overflow: hidden;
  }
}

.stage-wrap {
  min-height: 0;
  min-width: 0;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(ellipse at 30% 20%, #151c26 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, #0e131a 0%, transparent 50%),
    #0d1017;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
}

.mobile-tabbar {
  display: none;
}

.desktop-only {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.mobile-sheet {
  display: none;
}

@media (max-width: 1023px) {
  /* \u624B\u673A\u7AEF\u5934\u90E8\u6362\u6210\u4E24\u884C\uFF1A\u7B2C\u4E00\u884C \u54C1\u724C + \u64CD\u4F5C\u6309\u94AE\uFF0C\u7B2C\u4E8C\u884C \u9875\u6807\u7B7E\u6A2A\u5411\u6EDA\u52A8\u3002
     \u907F\u514D\u5355\u884C\u5185\u5BB9\u8D85\u51FA\u5C4F\u5BBD\u628A\u8BED\u8A00\u6309\u94AE\u6324\u51FA\u5C4F\u5E55\u3002 */
  .app-header {
    flex-wrap: wrap;
    padding: 8px var(--space-sm) 4px;
    gap: 8px;
  }

  .app-header h1 {
    font-size: 18px;
  }

  .brand-block {
    order: 1;
    margin-right: auto;
  }

  .header-actions {
    order: 2;
  }

  .app-header .page-tabs {
    order: 3;
    flex: 1 1 100%;
    min-width: 100%;
  }

  .app-body {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1fr) auto;
    /* \u517C\u5BB9 iPhone \u5E95\u90E8 Home \u6761 / Android \u624B\u52BF\u6761\u7684\u5B89\u5168\u533A */
    padding: 0 8px calc(8px + env(safe-area-inset-bottom, 0px));
    gap: 8px;
  }

  .desktop-only {
    display: none !important;
  }

  .mobile-tabbar {
    display: flex;
    gap: 8px;
    padding: 8px;
    flex-shrink: 0;
    background: var(--bg-panel);
    backdrop-filter: blur(14px) saturate(160%);
    border-radius: var(--radius-md);
    box-shadow: var(--card-shadow);
  }

  .mobile-tabbar button {
    flex: 1;
    min-height: var(--touch-min);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    transition: background var(--dur-fast) var(--ease-rheo);
  }

  .mobile-tabbar button.active {
    background: var(--accent-soft-strong);
    color: var(--accent-hover);
  }

  .mobile-sheet {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0, 0, 0, 0.55);
  }

  .mobile-sheet-panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    max-height: 75dvh;
    background: var(--bg-panel-strong);
    backdrop-filter: blur(18px) saturate(160%);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .mobile-sheet-handle {
    width: 40px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 10px auto 4px;
  }

  .mobile-sheet-title {
    padding: 8px 16px 12px;
    font-weight: 600;
    border-bottom: 1px solid var(--divider);
  }

  .mobile-sheet-body {
    overflow: auto;
    min-height: 0;
    flex: 1;
  }
}
